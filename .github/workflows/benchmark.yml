name: JSSP Benchmark

on:
  workflow_dispatch:
    inputs:
      timeout:
        description: "Timeout (seconds) per instance for bnb/dp"
        required: false
        default: "120"
  push:
    branches: [main]
    paths:
      - "algorithms/**"
      - "benchmarks/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark-bnb:
    name: "B&B Solver"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run B&B on all instances
        run: |
          mkdir -p results
          python run.py bnb --all \
            --timeout ${{ github.event.inputs.timeout || '120' }} \
            --output results/bnb_results.csv
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bnb-results
          path: results/bnb_results.csv

  benchmark-dp:
    name: "DP Solver"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run DP on all instances
        run: |
          mkdir -p results
          python run.py dp --all \
            --timeout ${{ github.event.inputs.timeout || '120' }} \
            --output results/dp_results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dp-results
          path: results/dp_results.json

  benchmark-gt:
    name: "Giffler-Thompson Solver"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run GT on all instances (all 5 priority rules)
        run: |
          mkdir -p results/gt_parts
          for rule in SPT LPT MWKR SRPT FCFS; do
            echo "Running GT with rule: $rule"
            python run.py gt --all --rule $rule \
              --output results/gt_parts/gt_${rule}.json > /dev/null
            echo "Done: $rule -> $(python -c "import json; d=json.load(open('results/gt_parts/gt_${rule}.json')); print(len(d), 'instances')")"
          done
          python scripts/merge_gt.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gt-results
          path: results/gt_results.json

  benchmark-sb:
    name: "Shifting Bottleneck Solver"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run SB on all instances
        run: |
          mkdir -p results
          python run.py sb --all --output results/sb_results.json > /dev/null
          echo "SB done: $(python -c "import json; d=json.load(open('results/sb_results.json')); print(len(d), 'instances')")"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sb-results
          path: results/sb_results.json

  collect-results:
    name: "Merge Results"
    runs-on: ubuntu-latest
    needs: [benchmark-bnb, benchmark-dp, benchmark-gt, benchmark-sb]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          path: results/
          merge-multiple: false
      - name: Merge and normalize all results
        run: python scripts/merge_all.py
      - name: Print summary
        run: |
          if [ -f results/all_results.csv ]; then
            echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            python scripts/merge_all.py 2>/dev/null | tail -n +2 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: all-results
          path: results/all_results.csv
